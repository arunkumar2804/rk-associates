<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK Associates | Website Under Construction</title>
    <meta name="description" content="The official website of RK Associates is currently under construction. Stay tuned for our new digital experience.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-overlay"></div>
    
    <main class="container" id="main-container">
        <header class="header" id="site-header">
            <div class="logo-container">
                <span class="logo-accent">R</span>
                <span class="logo-accent">K</span>
                <span class="logo-divider"></span>
                <span class="logo-text">ASSOCIATES</span>
            </div>
        </header>

        <section class="content-card" id="construction-card">
            <div class="status-badge" id="status-badge">
                <span class="pulse-dot"></span>
                <span>COMING SOON</span>
            </div>
            
            <h1 class="main-heading" id="main-heading">Website Under Construction</h1>
            
            <p class="description" id="page-description">
                We are currently crafting a brand new digital experience to better showcase our services, expertise, and portfolio. Thank you for your patience.
            </p>

            <div class="progress-bar-container" id="progress-container">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>

            <!-- Email Notification Form -->
            <form class="notify-form" id="notify-form" onsubmit="handleNotify(event)">
                <label for="email-input" class="sr-only">Email Address</label>
                <input 
                    type="email" 
                    id="email-input" 
                    placeholder="Enter your email for updates" 
                    required 
                    autocomplete="email"
                >
                <button type="submit" id="submit-btn">
                    <span>Notify Me</span>
                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
            
            <div class="feedback-msg" id="feedback-msg" aria-live="polite"></div>
        </section>

        <footer class="footer" id="site-footer">
            <p class="copyright">&copy; 2026 RK Associates. All rights reserved.</p>
        </footer>
    </main>

    <script>
        function handleNotify(event) {
            event.preventDefault();
            const emailInput = document.getElementById('email-input');
            const feedbackMsg = document.getElementById('feedback-msg');
            const submitBtn = document.getElementById('submit-btn');
            
            if (emailInput.value) {
                // Save to localStorage just for frontend mock persistence
                const subscribers = JSON.parse(localStorage.getItem('rk_subscribers') || '[]');
                subscribers.push({ email: emailInput.value, timestamp: new Date().toISOString() });
                localStorage.setItem('rk_subscribers', JSON.stringify(subscribers));
                
                // Show success animation state
                feedbackMsg.textContent = "Thank you! We'll notify you as soon as we launch.";
                feedbackMsg.className = "feedback-msg success show";
                
                emailInput.value = '';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
                
                setTimeout(() => {
                    feedbackMsg.classList.remove('show');
                    submitBtn.disabled = false;
                    submitBtn.style.opacity = '1';
                }, 5000);
            }
        }
    </script>
</body>
</html>
